
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Google Login</title>

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>

    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0f172a;
      font-family:Arial;
      color:white;
    }

    .card{
      background:#1e293b;
      padding:30px;
      border-radius:12px;
      text-align:center;
      width:350px;
    }

    img{
      width:90px;
      border-radius:50%;
      margin-bottom:15px;
      display:none;
    }

    #userName{
      margin-top:10px;
    }

    #userEmail{
      opacity:0.8;
      font-size:14px;
    }

    button{
      margin-top:15px;
      padding:10px;
      width:100%;
      border:none;
      border-radius:8px;
      cursor:pointer;
      background:#ef4444;
      color:white;
      display:none;
    }

  </style>

</head>

<body>

<div class="card">

  <h2>Google Login</h2>

  <img id="userImage">

  <div id="buttonDiv"></div>

  <h3 id="userName"></h3>

  <p id="userEmail"></p>

  <button id="logoutBtn" onclick="logout()">
    Logout
  </button>

</div>

<script>

function handleCredentialResponse(response) {

  const responsePayload = parseJwt(response.credential);

  console.log(responsePayload);

  document.getElementById("userImage").src = responsePayload.picture;
  document.getElementById("userImage").style.display = "block";

  document.getElementById("userName").innerText = responsePayload.name;

  document.getElementById("userEmail").innerText = responsePayload.email;

  document.getElementById("buttonDiv").style.display = "none";

  document.getElementById("logoutBtn").style.display = "block";
}

window.onload = function () {

  google.accounts.id.initialize({

    client_id: "195096091607-71v1k3p3g139om4151gotpfrd7gve0v1.apps.googleusercontent.com",

    callback: handleCredentialResponse

  });

  google.accounts.id.renderButton(
    document.getElementById("buttonDiv"),
    {
      theme: "outline",
      size: "large",
      width: "250"
    }
  );

};

function logout(){

  google.accounts.id.disableAutoSelect();

  document.getElementById("userImage").style.display = "none";

  document.getElementById("userName").innerText = "";

  document.getElementById("userEmail").innerText = "";

  document.getElementById("buttonDiv").style.display = "block";

  document.getElementById("logoutBtn").style.display = "none";
}

function parseJwt (token) {

    var base64Url = token.split('.')[1];

    var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');

    var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {

        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);

    }).join(''));

    return JSON.parse(jsonPayload);
}

</script>

</body>
</html>
